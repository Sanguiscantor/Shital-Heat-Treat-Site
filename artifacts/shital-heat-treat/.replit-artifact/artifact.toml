kind = "web"
previewPath = "/"
title = "Shital Heat Treat"
version = "1.0.0"
id = "artifacts/shital-heat-treat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18650

[services.development]
run = "pnpm --filter @workspace/shital-heat-treat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shital-heat-treat", "run", "build" ]
publicDir = "artifacts/shital-heat-treat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18650"
BASE_PATH = "/"
